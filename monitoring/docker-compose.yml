version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: gaia_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    # Prometheus는 외부에 직접 노출하지 않음 (내부 전용)

  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: gaia_pushgateway
    restart: unless-stopped
    # Pushgateway도 외부에 직접 노출하지 않음 → nginx가 앞에서 인증 처리

  nginx:
    image: nginx:1.25-alpine
    container_name: gaia_nginx
    ports:
      - "9091:9091"   # 팀원이 push하는 포트 (토큰 인증)
      - "3000:3000"   # Grafana (Grafana가 직접 처리)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/tokens:/etc/nginx/tokens:ro
    depends_on:
      - pushgateway
      - grafana
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: gaia_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
