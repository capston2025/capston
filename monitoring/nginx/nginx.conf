events {}

http {
    # ── Pushgateway 앞단 (포트 9091) ─────────────────────────────────────
    # 팀원이 메트릭을 push하는 엔드포인트
    # Basic Auth로 팀 토큰 검증 후 내부 pushgateway로 프록시
    server {
        listen 9091;

        location ^~ /shared/ {
            auth_basic "GAIA Monitoring";
            auth_basic_user_file /etc/nginx/tokens/.htpasswd;

            alias /srv/gaia-shared/;
            autoindex on;
            autoindex_format json;
            client_max_body_size 2m;
            create_full_put_path on;
            dav_access user:rw group:rw all:r;
            dav_methods PUT DELETE MKCOL;
            default_type application/json;

            limit_except GET HEAD PUT {
                deny all;
            }
        }

        location / {
            auth_basic "GAIA Monitoring";
            auth_basic_user_file /etc/nginx/tokens/.htpasswd;

            proxy_pass http://pushgateway:9091;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Grafana 프록시 (포트 3000) ────────────────────────────────────────
    # Grafana는 자체 인증(로그인 페이지)을 사용하므로 nginx 인증 없이 프록시
    server {
        listen 3000;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
