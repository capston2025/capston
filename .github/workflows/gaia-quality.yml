name: GAIA Quality Gate

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile check
        run: |
          python -m compileall gaia scripts

      - name: Validate parity manifest JSON
        run: |
          python -m json.tool gaia/src/phase4/parity_manifest.json > /dev/null

      - name: Validate scenario format
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("gaia/tests/scenarios")
          required = {"id", "url", "goal", "constraints", "expected_signals", "time_budget_sec"}
          files = sorted(root.glob("*.json"))
          if not files:
              raise SystemExit("no scenario files found")
          count = 0
          for path in files:
              data = json.loads(path.read_text(encoding="utf-8"))
              # Suite 파일: 최상위에 "scenarios" 배열이 있는 경우
              if "scenarios" in data and isinstance(data["scenarios"], list):
                  scenarios = data["scenarios"]
              else:
                  scenarios = [data]
              for scenario in scenarios:
                  missing = required - set(scenario.keys())
                  if missing:
                      raise SystemExit(f"{path}: missing keys {sorted(missing)}")
                  if not isinstance(scenario["expected_signals"], list):
                      raise SystemExit(f"{path}: expected_signals must be list")
                  count += 1
          print(f"validated {count} scenarios across {len(files)} files")
          PY

  smoke:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: CLI smoke
        run: |
          python -m gaia.cli --help
          gaia --help
          gaia chat --help
          gaia ai --help
