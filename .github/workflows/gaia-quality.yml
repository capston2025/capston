name: GAIA Quality Gate

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile check
        run: |
          python -m compileall gaia scripts

      - name: Validate parity manifest JSON
        run: |
          python -m json.tool gaia/src/phase4/parity_manifest.json > /dev/null

      - name: Validate scenario format
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("gaia/tests/scenarios")
          required = {"id", "url", "goal", "constraints", "expected_signals", "time_budget_sec"}
          files = sorted(root.glob("*.json"))
          if not files:
              raise SystemExit("no scenario files found")
          for path in files:
              data = json.loads(path.read_text(encoding="utf-8"))
              missing = required - set(data.keys())
              if missing:
                  raise SystemExit(f"{path}: missing keys {sorted(missing)}")
              if not isinstance(data["expected_signals"], list):
                  raise SystemExit(f"{path}: expected_signals must be list")
          print(f"validated {len(files)} scenario files")
          PY

  smoke:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: CLI smoke
        run: |
          python -m gaia.cli --help
          gaia --help
          gaia chat --help
          gaia ai --help
