name: GAIA Release Check

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  packaging-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel and smoke
        run: |
          python -m pip install dist/*.whl
          gaia --help
          gaia chat --help

      - name: Verify homebrew formula exists
        run: |
          test -f homebrew/Formula/gaia.rb
