name: Harness Docs

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "README.md"
      - "docs/harness/**"
      - "scripts/context_pack.py"
      - "scripts/lint_harness_docs.py"
      - "gaia/docs/AGENT_HARNESS_PLAYBOOK.md"
  push:
    branches: ["main"]
    paths:
      - "AGENTS.md"
      - "README.md"
      - "docs/harness/**"
      - "scripts/context_pack.py"
      - "scripts/lint_harness_docs.py"
      - "gaia/docs/AGENT_HARNESS_PLAYBOOK.md"

jobs:
  lint-harness-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint harness docs
        run: python scripts/lint_harness_docs.py
